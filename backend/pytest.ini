[pytest]
# Warning hygiene. We silence ONLY third-party deprecations we cannot act on —
# scoped by category, never a blanket `ignore` — so a real warning from our own
# code still shows up in the summary.
#   * PydanticDeprecatedSince20: raised by cognee 1.2.2 defining its config models
#     with the deprecated `Field(env=...)` / `json_encoders` (their code, not ours).
#   * Starlette testclient httpx notice: raised by fastapi's TestClient import.
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore:Using `httpx` with `starlette.testclient` is deprecated
